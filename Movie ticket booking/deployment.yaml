apiVersion: apps/v1
kind: Deployment
metadata:
  name: movie-ticket-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: movie-ticket-app
  template:
    metadata:
      labels:
        app: movie-ticket-app
    spec:
      containers:
      - name: movie-ticket-app
        image: harshada2004/movie-ticket-app:latest
        ports:
        - containerPort: 8080
